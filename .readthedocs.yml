# .readthedocs.yml
# Redirect to new docs at jax-md.github.io/jax-md/

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - mkdir -p $READTHEDOCS_OUTPUT/html
    - |
      cat > $READTHEDOCS_OUTPUT/html/index.html << 'EOF'
      <!DOCTYPE html>
      <html>
      <head>
          <meta charset="utf-8">
          <title>JAX MD - Documentation has moved</title>
          <meta http-equiv="refresh" content="0; url=https://jax-md.github.io/jax-md/">
          <link rel="canonical" href="https://jax-md.github.io/jax-md/">
      </head>
      <body>
          <p>JAX MD documentation has moved to
          <a href="https://jax-md.github.io/jax-md/">jax-md.github.io/jax-md/</a></p>
      </body>
      </html>
      EOF
